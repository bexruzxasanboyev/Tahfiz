<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tahfiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }
        
        html,
        body {
            overflow-x: hidden
        }
        
        .hero {
            padding-bottom: 16px;
        }
        
        .hero__container {
            max-width: 390px;
            width: 100%;
            margin: 0 auto;
        }
        
        .hero__box {
            background-image: url(./images/bg.avif);
            background-repeat: no-repeat;
            background-size: cover;
            padding: 0 10px;
            padding-top: 18px;
            background-position: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 12px 0 14px -8px #fff, inset -12px 0 14px -8px #fff, inset 0 -12px 14px -8px #fff;
        }
        
        .hero__top {
            display: flex;
            align-items: center;
            max-width: 206px;
            margin: 0 auto;
            gap: 4px;
            width: 100%;
            margin-bottom: 19px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0px 4px 16px 0px #00000070;
            justify-content: center;
        }
        
        .hero__top p {
            font-family: Inter, sans-serif;
            font-weight: 600;
            font-size: 16px;
            line-height: 38px;
        }
        
        .hero__title-box {
            background-color: rgba(223, 235, 147, 0.6);
            border: 1px solid #000000;
            border-radius: 12px;
            max-width: 358px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 34px;
            padding: 7px 0 5px;
        }
        
        .hero__title {
            font-family: Inter, sans-serif;
            font-weight: 700;
            color: white;
            position: relative;
            text-shadow: 0px 3px 3px 0px #000000B0;
            font-size: clamp(22px, 7vw, 24px);
            line-height: 26px;
            text-align: center;
            text-transform: uppercase;
        }
        
        .hero__title span {
            color: black;
        }
        
        .hero__wrapper {
            padding: 0 10px;
        }
        
        .hero__images {
            max-width: 214px;
            width: 100%;
            margin-left: auto;
            margin-bottom: -80px;
            margin-right: auto;
            display: flex;
        }
        
        .hero__btn {
            max-width: 368px;
            width: 100%;
            background: radial-gradient(35.48% 57.87% at 50% 100%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%), linear-gradient(90deg, #97A34D 0%, #B4C259 52.29%, #97A34D 100%);
            border-radius: 16px;
            padding: 22.5px 0;
            font-family: Poppins, sans-serif;
            font-weight: 600;
            font-size: clamp(26px, 5vw, 28px);
            line-height: 120%;
            color: white;
            cursor: pointer;
            box-shadow: 0px 5px 0px 0px #546200;
            margin-bottom: 34px;
            border: none;
            margin-left: auto;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 2;
            justify-content: center;
            margin-right: auto;
            text-align: center;
            text-transform: uppercase;
        }
        
        .hero__list {
            max-width: 346px;
            width: 100%;
            border-radius: 10px;
            background-color: white;
            border: 1px solid #000000;
            display: flex;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 24px;
            flex-direction: column;
            gap: 30px;
            padding: 19px 0 18px 26px;
        }
        
        .hero__item {
            display: flex;
            align-items: center;
            gap: 13px;
        }
        
        .hero__item p {
            font-family: Inter, sans-serif;
            font-weight: 300;
            font-size: clamp(15px, 4.5vw, 16px);
            line-height: 18px;
        }
    </style>

    <link rel="stylesheet" href="./css/main.css" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="./css/main.css">
    </noscript>
</head>

<body>
    <main>
        <section class="hero">
            <div class="hero__container">
                <div class="hero__box">
                    <div class="hero__top">
                        <img src="./images/calendar.png" loading="lazy" decoding="async" width="13" height="14" alt="calendar">
                        <p>2-3-May | Soat: 20:30</p>
                    </div>

                    <div class="hero__title-box">
                        <h1 class="hero__title">Arab tilini endi <br> boshlovchilar uchun <br>
                            <span>eng oson va samarali <br>
                                metodlar</span>
                        </h1>
                    </div>

                    <img class="hero__images" src="./images/speaker.avif" loading="lazy" decoding="async" width="214" height="415" alt="speaker">
                    <button class="hero__btn" onclick="location.href='./thankYou.html'">Bepul qatnashish</button>
                </div>
                <div class="hero__wrapper">
                    <ul class="hero__list">
                        <li class="hero__item">
                            <img src="./images/verfiy.png" loading="lazy" decoding="async" width="25" height="25" alt="verfiy">
                            <p>Qur’oni Karimning ilk oyatlari </p>
                        </li>
                        <li class="hero__item">
                            <img src="./images/verfiy.png" loading="lazy" decoding="async" width="25" height="25" alt="verfiy">
                            <p>Arab tilida muhim bo'lgan qoidalar</p>
                        </li>
                        <li class="hero__item">
                            <img src="./images/verfiy.png" loading="lazy" decoding="async" width="25" height="25" alt="verfiy">
                            <p>Arab tilida eng ko‘p uchraydigan katta va kichikxatolar </p>
                        </li>
                        <li class="hero__item">
                            <img src="./images/verfiy.png" loading="lazy" decoding="async" width="25" height="25" alt="verfiy">
                            <p>Dangasalikni yengish va ilm yo‘lida barqarorlikni shakllantirish </p>
                        </li>
                    </ul>

                    <button class="hero__btn" onclick="location.href='./thankYou.html'">Bepul qatnashish</button>
                </div>
            </div>
        </section>
    </main>

</body>


</html>
